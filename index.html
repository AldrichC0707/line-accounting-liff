<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>編輯記帳</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --cream:#FAF7F2;--paper:#F5F0E8;--paper2:#EDE8DF;
      --warm:#8B6F47;--warm-light:#C4A882;--warm-dark:#5C4A2A;
      --accent:#D4845A;--accent-light:#F2D4C4;
      --green:#5A8A6A;--green-light:#D4E8DA;
      --red:#B85450;--red-light:#F2D4D2;
      --text:#2C1F14;--text2:#7A6555;--text3:#B0A090;
      --shadow:0 2px 12px rgba(139,111,71,0.12);
      --radius:16px;
    }
    body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);min-height:100vh;padding-bottom:100px;}

    .header{background:var(--paper);border-bottom:1.5px solid var(--paper2);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
    .header-title{font-size:17px;font-weight:700;font-family:'Noto Serif TC',serif;color:var(--warm-dark);}
    .header-close{width:32px;height:32px;border-radius:50%;background:white;border:1.5px solid var(--paper2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);box-shadow:var(--shadow);}

    .type-section{background:white;margin:14px 16px;border-radius:var(--radius);border:1.5px solid var(--paper2);padding:16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);}
    .type-label{font-size:14px;color:var(--text2);font-family:'Noto Serif TC',serif;}
    .type-toggle{display:flex;background:var(--paper);border-radius:10px;padding:3px;gap:3px;border:1.5px solid var(--paper2);}
    .type-btn{padding:8px 22px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:var(--text3);background:transparent;transition:all 0.2s;}
    .type-btn.active-expense{background:var(--red);color:white;box-shadow:0 2px 8px rgba(184,84,80,0.3);}
    .type-btn.active-income{background:var(--green);color:white;box-shadow:0 2px 8px rgba(90,138,106,0.3);}

    .amount-section{background:white;margin:0 16px 12px;border-radius:var(--radius);border:1.5px solid var(--paper2);padding:18px;box-shadow:var(--shadow);}
    .amount-row{display:flex;align-items:center;justify-content:space-between;}
    .amount-label{font-size:14px;color:var(--text2);font-family:'Noto Serif TC',serif;}
    .amount-input-wrap{display:flex;align-items:center;gap:8px;}
    .amount-sign{font-size:20px;font-weight:700;color:var(--red);font-family:'Noto Serif TC',serif;}
    .amount-sign.income{color:var(--green);}
    .amount-input{font-size:28px;font-weight:900;color:var(--text);border:none;outline:none;text-align:right;width:160px;font-family:'Noto Serif TC',serif;background:transparent;}
    .amount-currency{font-size:13px;color:var(--text3);}

    .card{background:white;margin:0 16px 12px;border-radius:var(--radius);border:1.5px solid var(--paper2);overflow:hidden;box-shadow:var(--shadow);}
    .field{padding:15px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px dashed var(--paper2);cursor:pointer;min-height:52px;}
    .field:last-child{border-bottom:none;}
    .field-label{font-size:14px;color:var(--text2);flex-shrink:0;min-width:60px;font-family:'Noto Serif TC',serif;}
    .field-value{font-size:14px;color:var(--text);text-align:right;flex:1;}
    .field-value.placeholder{color:var(--text3);}
    .field-arrow{color:var(--paper2);margin-left:8px;font-size:14px;}

    .category-panel{display:none;padding:12px 16px;flex-wrap:wrap;gap:8px;background:var(--cream);border-top:1px dashed var(--paper2);}
    .category-panel.open{display:flex;}
    .cat-btn{padding:8px 16px;border-radius:20px;border:1.5px solid var(--paper2);background:white;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:var(--text2);transition:all 0.15s;}
    .cat-btn.selected{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:600;}

    .note-section{background:white;margin:0 16px 12px;border-radius:var(--radius);border:1.5px solid var(--paper2);padding:16px;box-shadow:var(--shadow);}
    .note-label{font-size:14px;color:var(--text2);margin-bottom:10px;font-family:'Noto Serif TC',serif;}
    .note-input{width:100%;border:1.5px solid var(--paper2);border-radius:10px;padding:12px;font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;resize:none;color:var(--text);background:var(--cream);transition:border-color 0.2s;}
    .note-input:focus{border-color:var(--accent);}

    .bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:var(--paper);border-top:1.5px solid var(--paper2);display:flex;gap:10px;}
    .btn-delete{flex:1;padding:14px;border-radius:var(--radius);border:1.5px solid var(--red);background:var(--red-light);color:var(--red);font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
    .btn-save{flex:2;padding:14px;border-radius:var(--radius);border:none;background:var(--accent);color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;box-shadow:0 2px 8px rgba(212,132,90,0.3);}
    .btn-save:active{opacity:0.85;}

    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;color:var(--text3);background:var(--cream);}
    .spinner{width:32px;height:32px;border:2px solid var(--paper2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,31,20,0.4);z-index:100;align-items:flex-end;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--paper);width:100%;border-radius:20px 20px 0 0;padding:20px 16px 40px;border-top:2px solid var(--paper2);}
    .modal-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:16px;font-family:'Noto Serif TC',serif;color:var(--warm-dark);}
    .modal-item{padding:14px 16px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--text);display:flex;align-items:center;justify-content:space-between;border-bottom:1px dashed var(--paper2);}
    .modal-item:last-child{border-bottom:none;}
    .modal-item:active{background:var(--cream);}
    .modal-item.selected{color:var(--accent);font-weight:600;}
    .modal-item.selected::after{content:'✓';}

    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--warm-dark);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;transition:transform 0.3s;font-family:'Noto Serif TC',serif;}
    .toast.show{transform:translateX(-50%) translateY(0);}

    .dev-badge{position:fixed;top:8px;right:8px;background:var(--accent);color:white;font-size:11px;padding:3px 8px;border-radius:10px;z-index:999;}
  </style>
</head>
<body>
<div id="loading" class="loading">
  <div class="spinner"></div>
  <div style="font-family:'Noto Serif TC',serif">載入中...</div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-title">編輯記帳</div>
    <button class="header-close" onclick="closeLiff()">✕</button>
  </div>

  <div class="type-section">
    <span class="type-label">屬性</span>
    <div class="type-toggle">
      <button class="type-btn" id="btn-expense" onclick="setType('expense')">支出</button>
      <button class="type-btn" id="btn-income" onclick="setType('income')">收入</button>
    </div>
  </div>

  <div class="amount-section">
    <div class="amount-row">
      <span class="amount-label">金額</span>
      <div class="amount-input-wrap">
        <span class="amount-sign" id="amount-sign">-</span>
        <input type="number" class="amount-input" id="amount-input" placeholder="0">
        <span class="amount-currency">NT$</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="field" onclick="toggleCategory()">
      <span class="field-label">類型</span>
      <span class="field-value" id="category-display">請選擇類別</span>
      <span class="field-arrow" id="category-arrow">▼</span>
    </div>
    <div class="category-panel" id="category-panel"></div>
  </div>

  <div class="card">
    <div class="field" onclick="openModal('asset')">
      <span class="field-label">帳戶</span>
      <span class="field-value" id="asset-display">請選擇帳戶</span>
      <span class="field-arrow">›</span>
    </div>
    <div class="field">
      <span class="field-label">日期</span>
      <input type="date" id="date-input" style="border:none;outline:none;font-size:14px;font-family:'Noto Serif TC',serif;color:var(--text);text-align:right;cursor:pointer;background:transparent;">
    </div>
  </div>

  <div class="note-section">
    <div class="note-label">備註</div>
    <textarea class="note-input" id="note-input" rows="2" placeholder="輸入備註..."></textarea>
  </div>

  <div class="bottom-bar">
    <button class="btn-delete" onclick="confirmDelete()">🗑 刪除</button>
    <button class="btn-save" onclick="saveRecord()">儲存</button>
  </div>
</div>

<div class="modal-overlay" id="asset-modal" onclick="closeModal('asset')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">選擇帳戶</div>
    <div id="asset-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const LIFF_ID='2009777350-hL4TXA5D';
  const N8N_GET='https://aldrichc.zeabur.app/webhook/18e29c1d-5b3c-49df-aa16-878a9abd6cbf';
  const N8N_UPDATE='https://aldrichc.zeabur.app/webhook/ecd97b5a-f198-4dce-9862-a39130ec06e9';
  const N8N_DELETE='https://aldrichc.zeabur.app/webhook/fc20e1fb-e4f7-4bd9-9664-69895c1e7eb7';

  const CATEGORIES_EXPENSE=['伙食費','交通費','居家','娛樂','購物','醫藥','生活','其他'];
  const CATEGORIES_INCOME=['薪資','獎金','投資收益','其他'];

  let txId=null,txData=null,assets=[],selectedAssetId=null,selectedCategory=null;
  let currentType='expense',isDevMode=false,lineUserId=null;

  async function init(){
    const params=new URLSearchParams(location.search);
    txId=params.get('tx_id');
    try{
      await liff.init({liffId:LIFF_ID});
      if(!liff.isInClient()){
        isDevMode=true;
        document.body.insertAdjacentHTML('beforeend','<div class="dev-badge">DEV</div>');
      }else{
        lineUserId=liff.getContext().userId;
      }
    }catch(e){
      isDevMode=true;
      document.body.insertAdjacentHTML('beforeend','<div class="dev-badge">DEV</div>');
    }

    if(isDevMode){
      txId=txId||'test-id';
      txData={type:'expense',amount:250,category:'伙食費',asset_id:null,transaction_date:new Date().toISOString().split('T')[0],item:'午餐'};
      assets=[{id:'1',name:'現金',type:'cash'},{id:'2',name:'中信',type:'bank'}];
      renderForm();
      document.getElementById('loading').style.display='none';
      document.getElementById('app').style.display='block';
      return;
    }

    if(!txId){showToast('找不到記帳資料');return;}

    const res=await fetch(N8N_GET,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tx_id:txId,line_user_id:lineUserId})});
    const data=await res.json();

    if(data.error){
      document.getElementById('loading').innerHTML=`<div style="color:var(--text3);padding:40px;text-align:center;font-family:'Noto Serif TC',serif">${data.error}</div>`;
      return;
    }

    txData=data.transaction;
    assets=data.assets||[];
    renderForm();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
  }

  function renderForm(){
    currentType=txData.type==='income'?'income':'expense';
    setType(currentType);
    document.getElementById('amount-input').value=txData.amount;
    selectedCategory=txData.category;
    document.getElementById('category-display').textContent=selectedCategory||'請選擇類別';
    renderCategoryPanel();
    selectedAssetId=txData.asset_id;
    const asset=assets.find(a=>a.id===selectedAssetId);
    document.getElementById('asset-display').textContent=asset?.name||'請選擇帳戶';
    document.getElementById('date-input').value=txData.transaction_date;
    document.getElementById('note-input').value=txData.item||'';
  }

  function setType(type){
    currentType=type;
    const expBtn=document.getElementById('btn-expense');
    const incBtn=document.getElementById('btn-income');
    const sign=document.getElementById('amount-sign');
    expBtn.className='type-btn'+(type==='expense'?' active-expense':'');
    incBtn.className='type-btn'+(type==='income'?' active-income':'');
    sign.textContent=type==='income'?'+':'-';
    sign.className='amount-sign'+(type==='income'?' income':'');
    renderCategoryPanel();
  }

  function renderCategoryPanel(){
    const cats=currentType==='income'?CATEGORIES_INCOME:CATEGORIES_EXPENSE;
    document.getElementById('category-panel').innerHTML=cats.map(c=>
      `<button class="cat-btn ${selectedCategory===c?'selected':''}" onclick="selectCategory('${c}')">${c}</button>`
    ).join('');
  }

  function toggleCategory(){
    const panel=document.getElementById('category-panel');
    const arrow=document.getElementById('category-arrow');
    panel.classList.toggle('open');
    arrow.textContent=panel.classList.contains('open')?'▲':'▼';
  }

  function selectCategory(cat){
    selectedCategory=cat;
    document.getElementById('category-display').textContent=cat;
    renderCategoryPanel();
  }

  function openModal(type){
    if(type==='asset'){
      document.getElementById('asset-list').innerHTML=assets
        .filter(a=>a.type!=='stock_account')
        .map(a=>`<div class="modal-item ${selectedAssetId===a.id?'selected':''}" onclick="selectAsset('${a.id}','${a.name}')">${a.name}</div>`)
        .join('');
      document.getElementById('asset-modal').classList.add('open');
    }
  }

  function closeModal(type){document.getElementById(`${type}-modal`).classList.remove('open');}

  function selectAsset(id,name){
    selectedAssetId=id;
    document.getElementById('asset-display').textContent=name;
    closeModal('asset');
  }

  async function saveRecord(){
    const amount=parseFloat(document.getElementById('amount-input').value);
    const date=document.getElementById('date-input').value;
    const note=document.getElementById('note-input').value;
    if(!amount||amount<=0){showToast('請輸入金額');return;}
    if(!selectedCategory){showToast('請選擇類別');return;}
    if(!date){showToast('請選擇日期');return;}
    if(isDevMode){showToast('DEV: 儲存成功');return;}
    await fetch(N8N_UPDATE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tx_id:txId,line_user_id:lineUserId,amount,category:selectedCategory,asset_id:selectedAssetId,transaction_date:date,item:note,type:currentType})});
    showToast('儲存成功！');
    setTimeout(()=>liff.closeWindow(),1200);
  }

  async function confirmDelete(){
    if(!confirm('確定要刪除這筆記錄嗎？'))return;
    if(isDevMode){showToast('DEV: 刪除成功');return;}
    await fetch(N8N_DELETE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tx_id:txId,line_user_id:lineUserId})});
    showToast('已刪除');
    setTimeout(()=>liff.closeWindow(),1200);
  }

  function closeLiff(){if(isDevMode){showToast('DEV: 關閉');return;}liff.closeWindow();}

  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);
  }

  init().catch(e=>{
    console.error(e);
    document.getElementById('loading').innerHTML='<div style="color:var(--text3);padding:40px;text-align:center;font-family:Noto Serif TC,serif">載入失敗，請重試</div>';
  });
</script>
</body>
</html>
