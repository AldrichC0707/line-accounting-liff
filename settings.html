<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --cream:#FAF7F2;--paper:#F5F0E8;--paper2:#EDE8DF;
      --warm:#8B6F47;--warm-light:#C4A882;--warm-dark:#5C4A2A;
      --accent:#D4845A;--accent-light:#F2D4C4;
      --green:#5A8A6A;--red:#B85450;
      --text:#2C1F14;--text2:#7A6555;--text3:#B0A090;
      --shadow:0 2px 12px rgba(139,111,71,0.12);
      --radius:16px;
    }
    body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);min-height:100vh;padding-bottom:40px;}
    .header{background:var(--paper);border-bottom:1.5px solid var(--paper2);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
    .header-title{font-size:17px;font-weight:700;font-family:'Noto Serif TC',serif;color:var(--warm-dark);}
    .header-btn{width:36px;height:36px;border-radius:50%;background:white;border:1.5px solid var(--paper2);cursor:pointer;font-size:15px;color:var(--text2);box-shadow:var(--shadow);}
    .back-btn{width:36px;height:36px;border-radius:50%;background:white;border:1.5px solid var(--paper2);cursor:pointer;font-size:18px;color:var(--text2);box-shadow:var(--shadow);}

    .profile-card{margin:14px 16px;background:white;border-radius:var(--radius);border:1.5px solid var(--paper2);padding:20px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow);}
    .avatar{width:58px;height:58px;border-radius:50%;border:2px solid var(--paper2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--accent-light);flex-shrink:0;}
    .avatar img{width:100%;height:100%;object-fit:cover;}
    .profile-name{font-size:18px;font-weight:700;font-family:'Noto Serif TC',serif;color:var(--warm-dark);margin-bottom:4px;}
    .profile-sub{font-size:12px;color:var(--text3);}

    .streak-card{margin:0 16px 14px;background:var(--accent-light);border-radius:var(--radius);border:1.5px solid var(--accent);padding:14px 16px;box-shadow:var(--shadow);}
    .streak-days{display:flex;gap:5px;margin-bottom:8px;}
    .streak-day{flex:1;height:30px;border-radius:8px;background:white;border:1.5px solid var(--paper2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text3);}
    .streak-day.done{background:var(--accent);border-color:var(--accent);color:white;}
    .streak-label{font-size:11px;color:var(--text3);}

    .section{margin:0 16px 12px;}
    .section-title{font-size:12px;font-weight:700;color:var(--text3);padding:8px 4px 6px;font-family:'Noto Serif TC',serif;letter-spacing:0.5px;}
    .menu-list{background:white;border-radius:var(--radius);border:1.5px solid var(--paper2);overflow:hidden;box-shadow:var(--shadow);}
    .menu-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px dashed var(--paper2);cursor:pointer;gap:12px;transition:background 0.15s;}
    .menu-item:last-child{border-bottom:none;}
    .menu-item:active{background:var(--cream);}
    .menu-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1.5px solid var(--paper2);}
    .menu-label{flex:1;font-size:14px;font-weight:500;color:var(--text);}
    .menu-arrow{font-size:14px;color:var(--paper2);}

    .subpage{display:none;position:fixed;inset:0;background:var(--cream);z-index:50;overflow-y:auto;padding-bottom:40px;}
    .subpage.open{display:block;}

    .asset-item{background:white;margin:0 16px 8px;border-radius:var(--radius);border:1.5px solid var(--paper2);padding:16px;box-shadow:var(--shadow);}
    .asset-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .asset-name{font-size:15px;font-weight:700;color:var(--text);font-family:'Noto Serif TC',serif;}
    .asset-type-badge{font-size:11px;color:var(--text3);background:var(--paper);padding:3px 8px;border-radius:8px;border:1px solid var(--paper2);}
    .input-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .input-row:last-of-type{margin-bottom:0;}
    .input-label{font-size:12px;color:var(--text3);width:60px;flex-shrink:0;}
    .input-field{flex:1;border:1.5px solid var(--paper2);border-radius:10px;padding:8px 12px;font-size:14px;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:white;outline:none;}
    .input-field:focus{border-color:var(--accent);}
    .select-field{flex:1;border:1.5px solid var(--paper2);border-radius:10px;padding:8px 12px;font-size:14px;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:white;outline:none;appearance:none;}
    .select-field:focus{border-color:var(--accent);}
    .save-btn{margin-top:10px;width:100%;padding:10px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
    .save-btn:active{opacity:0.8;}
    .save-btn.saved{background:var(--green);}

    .add-card{background:white;margin:0 16px 8px;border-radius:var(--radius);border:2px dashed var(--paper2);padding:16px;box-shadow:var(--shadow);}
    .add-card-title{font-size:14px;font-weight:700;color:var(--text3);font-family:'Noto Serif TC',serif;margin-bottom:14px;text-align:center;}
    .add-btn{width:100%;padding:10px;background:var(--warm-dark);color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:10px;}
    .add-btn:active{opacity:0.8;}

    .budget-item{background:white;margin:0 16px 8px;border-radius:var(--radius);border:1.5px solid var(--paper2);padding:16px;box-shadow:var(--shadow);}
    .budget-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .budget-name{font-size:15px;font-weight:700;color:var(--text);font-family:'Noto Serif TC',serif;}
    .budget-type-badge{font-size:11px;color:var(--text3);background:var(--paper);padding:3px 8px;border-radius:8px;border:1px solid var(--paper2);}

    .section-divider{height:1px;background:var(--paper2);margin:16px 16px 14px;}

    .version{text-align:center;color:var(--text3);font-size:12px;padding:20px;font-family:'Noto Serif TC',serif;}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;color:var(--text3);background:var(--cream);}
    .spinner{width:32px;height:32px;border:2px solid var(--paper2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .dev-badge{position:fixed;top:8px;right:8px;background:var(--accent);color:white;font-size:11px;padding:3px 8px;border-radius:10px;z-index:999;}
    .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--warm-dark);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;}
    .toast.show{opacity:1;}
  </style>
</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div><div style="font-family:'Noto Serif TC',serif">載入中...</div></div>

<!-- 主頁 -->
<div id="app" style="display:none">
  <div class="header">
    <div class="header-title">⚙️ 我的帳本</div>
    <button class="header-btn" onclick="closeLiff()">✕</button>
  </div>

  <div class="profile-card">
    <div class="avatar" id="avatar">👤</div>
    <div>
      <div class="profile-name" id="profile-name">載入中...</div>
      <div class="profile-sub">記帳機器人用戶</div>
    </div>
  </div>

  <div class="streak-card">
    <div class="streak-days" id="streak-days"></div>
    <div class="streak-label">最近 7 天記帳狀況</div>
  </div>

  <div class="section">
    <div class="section-title">─ 設定</div>
    <div class="menu-list">
      <div class="menu-item" onclick="openAccounts()">
        <div class="menu-icon">🏦</div>
        <div class="menu-label">我的帳戶</div>
        <div class="menu-arrow">›</div>
      </div>
      <div class="menu-item" onclick="openBudgets()">
        <div class="menu-icon">🎯</div>
        <div class="menu-label">預算與計畫</div>
        <div class="menu-arrow">›</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">─ 快速操作</div>
    <div class="menu-list">
      <div class="menu-item" onclick="openLiff('2009777350-BrcCzjVy')">
        <div class="menu-icon">💰</div><div class="menu-label">資產總覽</div><div class="menu-arrow">›</div>
      </div>
      <div class="menu-item" onclick="openLiff('2009777350-UCqGP1Pa')">
        <div class="menu-icon">📊</div><div class="menu-label">收支分析</div><div class="menu-arrow">›</div>
      </div>
      <div class="menu-item" onclick="openLiff('2009777350-FZreptEC')">
        <div class="menu-icon">📋</div><div class="menu-label">記帳明細</div><div class="menu-arrow">›</div>
      </div>
      <div class="menu-item" onclick="openLiff('2009777350-dnzawjtp')">
        <div class="menu-icon">📖</div><div class="menu-label">使用說明</div><div class="menu-arrow">›</div>
      </div>
    </div>
  </div>

  <div class="version">記帳機器人 v1.0 ✦ 手帳版</div>
</div>

<!-- 帳戶子頁面 -->
<div class="subpage" id="page-accounts">
  <div class="header">
    <button class="back-btn" onclick="closeSubpage('page-accounts')">‹</button>
    <div class="header-title">🏦 我的帳戶</div>
    <div style="width:36px"></div>
  </div>
  <div style="height:14px"></div>
  <div id="accounts-list"></div>

  <!-- 新增帳戶表單 -->
  <div class="section-divider"></div>
  <div class="add-card">
    <div class="add-card-title">＋ 新增帳戶</div>
    <div class="input-row">
      <div class="input-label">帳戶名稱</div>
      <input class="input-field" type="text" id="new-account-name" placeholder="例：玉山銀行">
    </div>
    <div class="input-row">
      <div class="input-label">類型</div>
      <select class="select-field" id="new-account-type" onchange="toggleCreditFields()">
        <option value="cash">現金</option>
        <option value="bank">銀行</option>
        <option value="credit">信用卡</option>
        <option value="stock_account">券商帳戶</option>
      </select>
    </div>
    <div class="input-row" id="row-balance">
      <div class="input-label">初始餘額</div>
      <input class="input-field" type="number" id="new-account-balance" placeholder="0" value="0">
    </div>
    <div class="input-row" id="row-credit-limit" style="display:none">
      <div class="input-label">信用額度</div>
      <input class="input-field" type="number" id="new-account-credit-limit" placeholder="0" value="0">
    </div>
    <button class="add-btn" onclick="createAccount()">新增帳戶</button>
  </div>
</div>

<!-- 預算子頁面 -->
<div class="subpage" id="page-budgets">
  <div class="header">
    <button class="back-btn" onclick="closeSubpage('page-budgets')">‹</button>
    <div class="header-title">🎯 預算與計畫</div>
    <div style="width:36px"></div>
  </div>
  <div style="height:14px"></div>
  <div id="budgets-list"></div>

  <!-- 新增預算/計畫表單 -->
  <div class="section-divider"></div>
  <div class="add-card">
    <div class="add-card-title">＋ 新增預算／計畫</div>
    <div class="input-row">
      <div class="input-label">名稱</div>
      <input class="input-field" type="text" id="new-budget-name" placeholder="例：餐飲預算">
    </div>
    <div class="input-row">
      <div class="input-label">類型</div>
      <select class="select-field" id="new-budget-type" onchange="toggleBudgetFields()">
        <option value="budget">預算（限制花費）</option>
        <option value="savings">計畫（儲蓄目標）</option>
      </select>
    </div>
    <div class="input-row">
      <div class="input-label">分類</div>
      <input class="input-field" type="text" id="new-budget-category" placeholder="例：伙食費">
    </div>
    <div class="input-row" id="row-limit-amount">
      <div class="input-label">上限金額</div>
      <input class="input-field" type="number" id="new-budget-limit" placeholder="0" value="0">
    </div>
    <div class="input-row" id="row-target-amount" style="display:none">
      <div class="input-label">目標金額</div>
      <input class="input-field" type="number" id="new-budget-target" placeholder="0" value="0">
    </div>
    <div class="input-row">
      <div class="input-label">週期</div>
      <select class="select-field" id="new-budget-period">
        <option value="monthly">每月</option>
        <option value="yearly">每年</option>
        <option value="weekly">每週</option>
      </select>
    </div>
    <button class="add-btn" onclick="createBudget()">新增</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const LIFF_ID='2009777350-iHzyYcrC';
  const API={
    profile:'https://aldrichc.zeabur.app/webhook/e76d52d2-16eb-4fd0-b97a-5e94b77b10c0',
    getAccounts:'https://aldrichc.zeabur.app/webhook/71c97966-744d-4928-8827-fd64319e228a',
    updateAccount:'https://aldrichc.zeabur.app/webhook/48678383-5e2a-4f66-abd8-2b2ca8f7ee52',
    createAccount:'https://aldrichc.zeabur.app/webhook/liff-create-account',
    getBudgets:'https://aldrichc.zeabur.app/webhook/4260a4bc-1298-4dd4-b4a2-2fbd6020bb0b',
    updateBudget:'https://aldrichc.zeabur.app/webhook/4fc6708e-4d3f-4ae7-91ce-bd975b66b25a',
    createBudget:'https://aldrichc.zeabur.app/webhook/liff-create-budget',
  };
  let lineUserId=null,isDevMode=false;

  async function init(){
  try{
    await liff.init({liffId:LIFF_ID});
    try{
      const profile=await liff.getProfile();
      lineUserId=profile.userId;
      if(!lineUserId) throw new Error('no userId');
      let activeDates=[];
      try{
        const res=await fetch(API.profile,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({line_user_id:lineUserId})});
        const d=await res.json();
        activeDates=d.activeDates||[];
      }catch(e){}
      renderProfile(profile,activeDates);
    }catch(e){
      isDevMode=true;
      document.body.insertAdjacentHTML('beforeend','<div class="dev-badge">DEV</div>');
      renderProfile({displayName:'DEV 使用者',pictureUrl:null},[]);
    }
  }catch(e){
    isDevMode=true;
    document.body.insertAdjacentHTML('beforeend','<div class="dev-badge">DEV</div>');
    renderProfile({displayName:'使用者',pictureUrl:null},[]);
  }
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
}

  function renderProfile(profile,activeDates){
    document.getElementById('profile-name').textContent=profile.displayName||'使用者';
    if(profile.pictureUrl) document.getElementById('avatar').innerHTML=`<img src="${profile.pictureUrl}">`;
    const weekDays=['日','一','二','三','四','五','六'];
    const days=[];
    for(let i=6;i>=0;i--){
      const d=new Date();
      d.setDate(d.getDate()-i);
      const dateStr=d.toISOString().split('T')[0];
      const done=activeDates.includes(dateStr);
      days.push({label:weekDays[d.getDay()],done});
    }
    document.getElementById('streak-days').innerHTML=days.map(d=>
      `<div class="streak-day ${d.done?'done':''}">${d.label}</div>`
    ).join('');
  }

  async function openAccounts(){
    document.getElementById('page-accounts').classList.add('open');
    document.getElementById('accounts-list').innerHTML='<div class="loading" style="height:200px"><div class="spinner"></div></div>';
    if(isDevMode){
      renderAccounts([
        {id:'1',name:'現金',type:'cash',balance:-9000},
        {id:'2',name:'中信銀行',type:'bank',balance:10},
        {id:'3',name:'中信卡',type:'credit',balance:150000,used_amount:56,credit_limit:150000},
      ]);
      return;
    }
    const res=await fetch(API.getAccounts,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({line_user_id:lineUserId})});
    const d=await res.json();
    renderAccounts(d.assets||[]);
  }

  function renderAccounts(assets){
    const typeLabel={cash:'現金',bank:'銀行',credit:'信用卡',stock_account:'券商帳戶'};
    const typeIcon={cash:'💵',bank:'🏦',credit:'💳',stock_account:'📊'};
    document.getElementById('accounts-list').innerHTML=assets.map(a=>{
      const isCredit=a.type==='credit';
      return `<div class="asset-item">
        <div class="asset-header">
          <div class="asset-name">${typeIcon[a.type]||'🏦'} ${a.name}</div>
          <div class="asset-type-badge">${typeLabel[a.type]||a.type}</div>
        </div>
        ${isCredit?`
          <div class="input-row">
            <div class="input-label">已使用</div>
            <input class="input-field" type="number" id="used-${a.id}" value="${a.used_amount||0}">
          </div>
          <div class="input-row">
            <div class="input-label">信用額度</div>
            <input class="input-field" type="number" id="limit-${a.id}" value="${a.credit_limit||0}">
          </div>
        `:`
          <div class="input-row">
            <div class="input-label">餘額</div>
            <input class="input-field" type="number" id="bal-${a.id}" value="${a.balance||0}">
          </div>
        `}
        <button class="save-btn" id="btn-${a.id}" onclick="saveAccount('${a.id}','${a.type}')">儲存</button>
      </div>`;
    }).join('')||'<div style="text-align:center;padding:40px;color:var(--text3)">沒有帳戶資料</div>';
  }

  async function saveAccount(id,type){
    const btn=document.getElementById(`btn-${id}`);
    btn.textContent='儲存中...';btn.disabled=true;
    const isCredit=type==='credit';
    const body={asset_id:id};
    if(isCredit){
      body.used_amount=parseFloat(document.getElementById(`used-${id}`).value)||0;
      body.credit_limit=parseFloat(document.getElementById(`limit-${id}`).value)||0;
    }else{
      body.balance=parseFloat(document.getElementById(`bal-${id}`).value)||0;
    }
    try{
      if(!isDevMode) await fetch(API.updateAccount,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      btn.textContent='✓ 已儲存';btn.classList.add('saved');
      showToast('儲存成功！');
      setTimeout(()=>{btn.textContent='儲存';btn.classList.remove('saved');btn.disabled=false;},2000);
    }catch(e){btn.textContent='儲存失敗';btn.disabled=false;}
  }

  function toggleCreditFields(){
    const type=document.getElementById('new-account-type').value;
    document.getElementById('row-balance').style.display=type==='credit'?'none':'flex';
    document.getElementById('row-credit-limit').style.display=type==='credit'?'flex':'none';
  }

  async function createAccount(){
    const name=document.getElementById('new-account-name').value.trim();
    const type=document.getElementById('new-account-type').value;
    if(!name){showToast('請輸入帳戶名稱');return;}
    const btn=document.querySelector('.add-card .add-btn');
    btn.textContent='新增中...';btn.disabled=true;
    const body={line_user_id:lineUserId,name,type};
    if(type==='credit'){
      body.credit_limit=parseFloat(document.getElementById('new-account-credit-limit').value)||0;
      body.used_amount=0;
      body.balance=0;
    }else{
      body.balance=parseFloat(document.getElementById('new-account-balance').value)||0;
    }
    try{
      if(!isDevMode) await fetch(API.createAccount,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      showToast('帳戶新增成功！');
      document.getElementById('new-account-name').value='';
      document.getElementById('new-account-balance').value='0';
      document.getElementById('new-account-credit-limit').value='0';
      await openAccounts();
    }catch(e){showToast('新增失敗，請重試');}
    btn.textContent='新增帳戶';btn.disabled=false;
  }

  async function openBudgets(){
    document.getElementById('page-budgets').classList.add('open');
    document.getElementById('budgets-list').innerHTML='<div class="loading" style="height:200px"><div class="spinner"></div></div>';
    if(isDevMode){
      renderBudgets([
        {id:'1',name:'餐飲預算',plan_type:'budget',category:'伙食費',limit_amount:5000,target_amount:0,period:'monthly'},
        {id:'2',name:'旅遊計畫',plan_type:'savings',category:'旅遊',limit_amount:0,target_amount:30000,period:'yearly'},
      ]);
      return;
    }
    const res=await fetch(API.getBudgets,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({line_user_id:lineUserId})});
    const d=await res.json();
    renderBudgets(d.budgets||[]);
  }

  function renderBudgets(budgets){
    const periodLabel={monthly:'每月',yearly:'每年',weekly:'每週'};
    document.getElementById('budgets-list').innerHTML=budgets.map(b=>{
      const isBudget=b.plan_type==='budget';
      return `<div class="budget-item">
        <div class="budget-header">
          <div class="budget-name">${isBudget?'🎯':'💰'} ${b.name}</div>
          <div class="budget-type-badge">${isBudget?'預算':'計畫'} · ${periodLabel[b.period]||b.period}</div>
        </div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:10px">${b.category||''}</div>
        ${isBudget?`
          <div class="input-row">
            <div class="input-label">上限金額</div>
            <input class="input-field" type="number" id="limit-${b.id}" value="${b.limit_amount||0}">
          </div>
        `:`
          <div class="input-row">
            <div class="input-label">目標金額</div>
            <input class="input-field" type="number" id="target-${b.id}" value="${b.target_amount||0}">
          </div>
        `}
        <button class="save-btn" id="btn-${b.id}" onclick="saveBudget('${b.id}','${b.plan_type}')">儲存</button>
      </div>`;
    }).join('')||'<div style="text-align:center;padding:40px;color:var(--text3)">沒有預算或計畫</div>';
  }

  async function saveBudget(id,type){
    const btn=document.getElementById(`btn-${id}`);
    btn.textContent='儲存中...';btn.disabled=true;
    const isBudget=type==='budget';
    const body={budget_id:id};
    if(isBudget){
      body.limit_amount=parseFloat(document.getElementById(`limit-${id}`).value)||0;
      body.target_amount=0;
    }else{
      body.target_amount=parseFloat(document.getElementById(`target-${id}`).value)||0;
      body.limit_amount=0;
    }
    try{
      if(!isDevMode) await fetch(API.updateBudget,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      btn.textContent='✓ 已儲存';btn.classList.add('saved');
      showToast('儲存成功！');
      setTimeout(()=>{btn.textContent='儲存';btn.classList.remove('saved');btn.disabled=false;},2000);
    }catch(e){btn.textContent='儲存失敗';btn.disabled=false;}
  }

  function toggleBudgetFields(){
    const type=document.getElementById('new-budget-type').value;
    document.getElementById('row-limit-amount').style.display=type==='budget'?'flex':'none';
    document.getElementById('row-target-amount').style.display=type==='savings'?'flex':'none';
  }

  async function createBudget(){
    const name=document.getElementById('new-budget-name').value.trim();
    const type=document.getElementById('new-budget-type').value;
    const category=document.getElementById('new-budget-category').value.trim();
    const period=document.getElementById('new-budget-period').value;
    if(!name){showToast('請輸入名稱');return;}
    const btn=document.querySelector('#page-budgets .add-btn');
    btn.textContent='新增中...';btn.disabled=true;
    const body={
      line_user_id:lineUserId,name,plan_type:type,category,period,
      limit_amount:type==='budget'?parseFloat(document.getElementById('new-budget-limit').value)||0:0,
      target_amount:type==='savings'?parseFloat(document.getElementById('new-budget-target').value)||0:0,
    };
    try{
      if(!isDevMode) await fetch(API.createBudget,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      showToast('新增成功！');
      document.getElementById('new-budget-name').value='';
      document.getElementById('new-budget-category').value='';
      document.getElementById('new-budget-limit').value='0';
      document.getElementById('new-budget-target').value='0';
      await openBudgets();
    }catch(e){showToast('新增失敗，請重試');}
    btn.textContent='新增';btn.disabled=false;
  }

  function closeSubpage(id){document.getElementById(id).classList.remove('open');}
  function openLiff(liffId){liff.openWindow({url:`https://liff.line.me/${liffId}`,external:false});}
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);
  }
  function closeLiff(){if(isDevMode){return;}liff.closeWindow();}
  init().catch(()=>{document.getElementById('loading').innerHTML='<div style="color:var(--text3);padding:40px;text-align:center">載入失敗</div>';});
</script>
</body>
</html>
