<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記帳明細</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --cream:#FAF7F2;--paper:#F5F0E8;--paper2:#EDE8DF;
      --warm:#8B6F47;--warm-light:#C4A882;--warm-dark:#5C4A2A;
      --accent:#D4845A;
      --green:#5A8A6A;--red:#B85450;
      --text:#2C1F14;--text2:#7A6555;--text3:#B0A090;
      --shadow:0 2px 12px rgba(139,111,71,0.12);
      --radius:16px;
    }
    body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);min-height:100vh;padding-bottom:40px;}
    .header{background:var(--paper);border-bottom:1.5px solid var(--paper2);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
    .header-title{font-size:17px;font-weight:700;font-family:'Noto Serif TC',serif;color:var(--warm-dark);}
    .header-btn{width:36px;height:36px;border-radius:50%;background:white;border:1.5px solid var(--paper2);cursor:pointer;font-size:15px;color:var(--text2);box-shadow:var(--shadow);}

    .month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--paper);}
    .month-btn{width:36px;height:36px;border-radius:50%;background:white;border:1.5px solid var(--paper2);cursor:pointer;font-size:16px;color:var(--text2);box-shadow:var(--shadow);}
    .month-label{font-size:16px;font-weight:700;font-family:'Noto Serif TC',serif;color:var(--warm-dark);}

    .summary-row{display:flex;gap:8px;margin:12px 16px;}
    .summary-card{flex:1;background:white;border-radius:12px;border:1.5px solid var(--paper2);padding:12px;box-shadow:var(--shadow);text-align:center;}
    .summary-label{font-size:10px;color:var(--text3);margin-bottom:4px;font-family:'Noto Serif TC',serif;}
    .summary-value{font-size:15px;font-weight:700;font-family:'Noto Serif TC',serif;}

    .section{margin:0 16px 12px;}
    .date-header{font-size:12px;color:var(--text3);padding:10px 4px 6px;font-family:'Noto Serif TC',serif;border-bottom:1px solid var(--paper2);margin-bottom:4px;}

    .tx-list{background:white;border-radius:var(--radius);border:1.5px solid var(--paper2);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px;}
    .tx-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px dashed var(--paper2);gap:12px;cursor:pointer;}
    .tx-item:last-child{border-bottom:none;}
    .tx-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1.5px solid var(--paper2);}
    .tx-info{flex:1;}
    .tx-name{font-size:14px;font-weight:600;color:var(--text);}
    .tx-cat{font-size:11px;color:var(--text3);margin-top:2px;}
    .tx-right{text-align:right;}
    .tx-amount{font-size:15px;font-weight:700;font-family:'Noto Serif TC',serif;}
    .tx-asset{font-size:11px;color:var(--text3);margin-top:2px;}

    .empty{padding:40px;text-align:center;color:var(--text3);font-family:'Noto Serif TC',serif;}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;color:var(--text3);background:var(--cream);}
    .spinner{width:32px;height:32px;border:2px solid var(--paper2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div id="loading" class="loading"><div class="spinner"></div><div style="font-family:'Noto Serif TC',serif">載入中...</div></div>
<div id="app" style="display:none">
  <div class="header">
    <div class="header-title">📋 記帳明細</div>
    <button class="header-btn" onclick="closeLiff()">✕</button>
  </div>
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="month-label"></div>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="summary-row">
    <div class="summary-card"><div class="summary-label">收入</div><div class="summary-value" id="sum-income" style="color:var(--green)">0</div></div>
    <div class="summary-card"><div class="summary-label">支出</div><div class="summary-value" id="sum-expense" style="color:var(--red)">0</div></div>
    <div class="summary-card"><div class="summary-label">結餘</div><div class="summary-value" id="sum-balance">0</div></div>
  </div>
  <div id="tx-container"></div>
</div>

<script>
  const LIFF_ID='2009777350-FZreptEC';
  const N8N='https://aldrichc.zeabur.app/webhook/f7dddde5-90d3-4422-a712-2d7724f89855';
  let lineUserId=null,isDevMode=false;
  let curYear=new Date().getFullYear(),curMonth=new Date().getMonth()+1;

  async function init(){
    try{
      await liff.init({liffId:LIFF_ID});
      if(!liff.isInClient()){
        isDevMode=true;
      }else{
        try{
          const profile=await liff.getProfile();
          lineUserId=profile.userId;
        }catch(e){
          document.getElementById('loading').innerHTML='<div style="color:var(--text3);padding:40px;text-align:center">無法取得用戶資訊</div>';
          return;
        }
      }
    }catch(e){isDevMode=true;}
    await loadData();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
  }

  async function loadData(){
    updateMonthLabel();
    const start=`${curYear}-${String(curMonth).padStart(2,'0')}-01`;
    const end=new Date(curYear,curMonth,0).toISOString().split('T')[0];
    let transactions=[];
    if(isDevMode){
      transactions=[
        {id:'1',type:'expense',amount:150,category:'餐飲',item:'午餐',transaction_date:'2026-04-13',asset_id:'1'},
        {id:'2',type:'income',amount:50000,category:'薪資',item:'四月薪水',transaction_date:'2026-04-10',asset_id:'2'},
        {id:'3',type:'expense',amount:3000,category:'交通',item:'加油',transaction_date:'2026-04-10',asset_id:'1'},
        {id:'4',type:'expense',amount:500,category:'購物',item:'超市',transaction_date:'2026-04-05',asset_id:'1'},
      ];
    }else{
      const res=await fetch(N8N,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({line_user_id:lineUserId,start_date:start,end_date:end})});
      const d=await res.json();
      transactions=d.transactions||[];
    }
    render(transactions);
  }

  function updateMonthLabel(){
    document.getElementById('month-label').textContent=`${curYear} 年 ${curMonth} 月`;
  }

  async function changeMonth(delta){
    curMonth+=delta;
    if(curMonth>12){curMonth=1;curYear++;}
    if(curMonth<1){curMonth=12;curYear--;}
    document.getElementById('loading').style.display='flex';
    document.getElementById('app').style.display='none';
    await loadData();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
  }

  function render(transactions){
    const income=transactions.filter(t=>t.type==='income').reduce((s,t)=>s+parseFloat(t.amount||0),0);
    const expense=transactions.filter(t=>t.type==='expense'||t.type==='credit_expense').reduce((s,t)=>s+parseFloat(t.amount||0),0);
    const balance=income-expense;
    document.getElementById('sum-income').textContent=income.toLocaleString();
    document.getElementById('sum-expense').textContent=expense.toLocaleString();
    const balEl=document.getElementById('sum-balance');
    balEl.textContent=balance.toLocaleString();
    balEl.style.color=balance>=0?'var(--green)':'var(--red)';

    if(transactions.length===0){
      document.getElementById('tx-container').innerHTML='<div class="empty">本月沒有記帳資料</div>';
      return;
    }

    // 依日期分組
    const groups={};
    transactions.sort((a,b)=>new Date(b.transaction_date)-new Date(a.transaction_date));
    transactions.forEach(t=>{
      const d=t.transaction_date.split('T')[0];
      if(!groups[d])groups[d]=[];
      groups[d].push(t);
    });

    const typeIcon={'expense':'💸','income':'💰','transfer':'🔄','credit_expense':'💳','stock_buy':'📈','stock_sell':'📉'};
    const html=Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date=>{
      const d=new Date(date);
      const dateStr=`${d.getMonth()+1}/${d.getDate()}（${'日一二三四五六'[d.getDay()]}）`;
      const items=groups[date].map(t=>{
        const isExpense=t.type==='expense'||t.type==='credit_expense';
        const isIncome=t.type==='income';
        const color=isExpense?'var(--red)':isIncome?'var(--green)':'var(--text2)';
        const prefix=isExpense?'-':isIncome?'+':'';
        const icon=typeIcon[t.type]||'📝';
        return `<div class="tx-item">
          <div class="tx-icon">${icon}</div>
          <div class="tx-info">
            <div class="tx-name">${t.item||t.category||'未分類'}</div>
            <div class="tx-cat">${t.category||''}${t.note?'・'+t.note:''}</div>
          </div>
          <div class="tx-right">
            <div class="tx-amount" style="color:${color}">${prefix}${parseFloat(t.amount||0).toLocaleString()}</div>
          </div>
        </div>`;
      }).join('');
      return `<div class="section">
        <div class="date-header">${dateStr}</div>
        <div class="tx-list">${items}</div>
      </div>`;
    }).join('');

    document.getElementById('tx-container').innerHTML=html;
  }

  function closeLiff(){liff.closeWindow();}
  init().catch(()=>{document.getElementById('loading').innerHTML='<div style="color:var(--text3);padding:40px;text-align:center">載入失敗</div>';});
</script>
</body>
</html>
